<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Memory | Elite</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.card{
width:90%;
max-width:380px;
background:#141414;
padding:35px;
border-radius:20px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.8);
}

h2{
margin-top:0;
}

.drop{
border:2px dashed #444;
border-radius:15px;
padding:40px 20px;
margin:20px 0;
cursor:pointer;
}

.drop:hover{
border-color:#00ff99;
}

video{
width:100%;
border-radius:10px;
display:none;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:#00ff99;
color:black;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

button:disabled{
background:#555;
cursor:not-allowed;
}

.progress{
height:4px;
background:#222;
margin-top:20px;
border-radius:5px;
overflow:hidden;
display:none;
}

.bar{
height:100%;
width:0%;
background:#00ff99;
}

.status{
font-size:12px;
margin-top:10px;
color:#aaa;
}

</style>
</head>

<body>

<div class="card">

<h2>Activate Your Gift</h2>
<p>Upload your memory video</p>

<div class="drop" onclick="videoFile.click()">
Tap to choose video
</div>

<video id="preview" autoplay muted loop playsinline></video>

<input type="file" id="videoFile" accept="video/*">

<input type="hidden" id="productId">

<button id="uploadBtn">Upload & Link</button>

<div class="progress" id="progress">
<div class="bar" id="bar"></div>
</div>

<div class="status" id="status"></div>

</div>

<script>

const WEB_APP_URL="https://script.google.com/macros/s/AKfycbxjPBl9Yb29GQIra-OecxL8o1Bu46u16ZY1KVvWDgfbq0mq6A2-9aaGHxp5TcxJOVRQ/exec"

const fileInput=document.getElementById("videoFile")
const preview=document.getElementById("preview")
const btn=document.getElementById("uploadBtn")
const status=document.getElementById("status")
const progress=document.getElementById("progress")
const bar=document.getElementById("bar")

/* Load Product ID */

window.onload=()=>{

const p=new URLSearchParams(window.location.search).get("product")

if(p){
document.getElementById("productId").value=p
}else{
status.innerText="Invalid product link"
btn.disabled=true
}

}

/* Preview */

fileInput.onchange=()=>{

const file=fileInput.files[0]

if(!file) return

preview.src=URL.createObjectURL(file)
preview.style.display="block"

}

/* Upload */

btn.onclick=async()=>{

const file=fileInput.files[0]
const productId=document.getElementById("productId").value

if(!file){
status.innerText="Please select a video"
return
}

if(file.size>10*1024*1024){
status.innerText="Video must be under 10MB"
return
}

btn.disabled=true
btn.innerText="Uploading..."

progress.style.display="block"
bar.style.width="25%"
status.innerText="Preparing video..."

const reader=new FileReader()

reader.readAsDataURL(file)

reader.onload=async()=>{

const base64=reader.result.split(',')[1]

bar.style.width="55%"
status.innerText="Uploading..."

try{

const res=await fetch(WEB_APP_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
productId:productId,
file:base64,
fileName:file.name
})
})

const data=await res.json()

if(data.status==="success"){

bar.style.width="100%"
status.innerText="Video linked successfully"
btn.innerText="Linked ✓"

}

else if(data.status==="blocked"){

status.innerText=data.message
btn.disabled=true

}

else{

status.innerText="Upload failed"

}

}

catch(err){

status.innerText="Connection error"
btn.disabled=false
btn.innerText="Retry Upload"

}

}

}

</script>

</body>
</html>
